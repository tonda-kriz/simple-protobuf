syntax = "proto3";

package UnitTest.map;

import "spb.proto";

message Int32Int32 {
  map<int32, int32> map = 1;
};

message StringString {
  map<string, string> map = 1;
}

message Int32String {
  map<int32, string> map = 1;
}

message StringInt32 {
  map<string, int32> map = 1;
}

message Name {
  string name = 1;
}

message StringName {
  map<string, Name> map = 1;
}

option (spb_fileopt).include = "<unordered_map>";
message UnorderedInt32Int32 {
  map<int32, int32> map = 1 [(spb_opt).map = "std::unordered_map<$, @>"];
};
